<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMOS | Streetwear Lab</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #151515;
            --accent: #FF5722; /* Laranja Cosmos */
            --text-main: #e0e0e0;
            --text-dim: #666666;
            --border: #222222;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            padding-top: 70px; /* Espaço para o header fixo */
        }

        /* --- Header --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo-container {
            height: 40px;
        }

        .logo-img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        nav { display: flex; align-items: center; }

        nav a {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 3px; text-decoration: none;
            color: var(--text-main); margin-left: 25px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--accent); }

        /* --- Hero Section --- */
        .hero {
            height: 80vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fotos/foto1.jpg');
            background-size: cover; background-position: center;
            padding: 0 5%;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: clamp(40px, 15vw, 160px);
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 20px; margin-bottom: 10px;
        }

        .hero p {
            font-size: 12px; letter-spacing: 10px;
            color: var(--accent); text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* --- Grid de Produtos --- */
        .catalog { padding: 50px 5% 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            overflow: hidden; transition: 0.4s;
            position: relative;
        }

        .product-card:hover { border-color: var(--accent); }

        .product-img {
            width: 100%; height: 500px;
            object-fit: cover; filter: grayscale(100%);
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover .product-img { filter: grayscale(0%); transform: scale(1.03); }

        .product-info {
            padding: 25px; display: flex; justify-content: space-between; align-items: flex-end;
            position: relative; z-index: 2;
        }

        .product-meta h3 {
            font-size: 13px; text-transform: uppercase;
            letter-spacing: 3px; font-weight: 500; margin-bottom: 5px;
        }

        .product-meta p { font-size: 14px; color: var(--accent); font-weight: bold; }

        .buy-btn {
            padding: 8px 15px; border: 1px solid var(--text-dim);
            color: var(--text-main); text-transform: uppercase;
            font-size: 10px; letter-spacing: 2px; text-decoration: none;
            background: none; cursor: pointer; transition: 0.3s;
        }

        .buy-btn:hover { border-color: var(--accent); background: var(--accent); color: #000; font-weight: bold; }

        /* --- Painel do Carrinho --- */
        #cart-modal {
            display: none; position: fixed; right: 0; top: 0; width: 320px; height: 100%;
            background: var(--bg-card); z-index: 2000; padding: 40px; border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); color: var(--text-main);
        }
        
        .close-cart { cursor: pointer; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); display: block; margin-bottom: 30px; }
        .cart-items-list { margin-bottom: 30px; max-height: 60vh; overflow-y: auto; font-size: 13px; }
        .cart-total-price { margin-bottom: 20px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; font-size: 16px; }
        .checkout-whatsapp { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; cursor: pointer; }

        /* --- Footer --- */
        footer {
            padding: 60px 5%; border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-logo-container {
            height: 30px; margin-bottom: 15px; display: block;
        }

        .footer-logo-img {
            height: 100%; width: auto; object-fit: contain;
            filter: grayscale(100%) brightness(0.7);
        }

        .footer-text { font-size: 10px; color: var(--text-dim); letter-spacing: 5px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .hero h1 { letter-spacing: 10px; }
            nav a:not(#cart-link) { display: none; }
            #cart-modal { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo/logo.png" class="logo-img" alt="COSMOS Logo">
        </div>
        <nav>
            <a href="#shop">Drop 01</a>
            <a href="#contact">Contact</a>
            <a href="javascript:void(0)" id="cart-link" onclick="toggleCart()" style="color: var(--accent); font-weight: bold;">Sacola (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <div id="cart-modal">
        <span class="close-cart" onclick="toggleCart()">[ FECHAR ]</span>
        <h2 style="letter-spacing: 5px; margin-bottom: 20px; font-size: 18px;">SUA SACOLA</h2>
        <div id="cart-items" class="cart-items-list">
            </div>
        <div id="cart-total" class="cart-total-price">TOTAL: R$ 0</div>
        <button class="checkout-whatsapp" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
    </div>

    <section class="hero">
        <h1>COSMOS</h1>
        <p>Moda Atemporal</p>
    </section>

    <section class="catalog" id="shop">
        <div class="grid">
            
            <div class="product-card">
                <img src="fotos/foto2.jpg" class="product-img" alt="Cosmos Drop">
                <div class="product-info">
                    <div class="product-meta">
                        <h3>Conjunto Irado</h3>
                        <p>R$ 260</p>
                    </div>
                    <button onclick="addToCart('Conjunto Irado', 260)" class="buy-btn">QUERO!</button>
                </div>
            </div>

            <div class="product-card">
                <img src="fotos/foto3.jpg" class="product-img" alt="Cosmos Drop">
                <div class="product-info">
                    <div class="product-meta">
                        <h3>Vestido Lulu</h3>
                        <p>R$ 175</p>
                    </div>
                    <button onclick="addToCart('Vestido Lulu', 175)" class="buy-btn">QUERO!</button>
                </div>
            </div>

            <div class="product-card">
                <img src="fotos/foto4.jpg" class="product-img" alt="Cosmos Drop">
                <div class="product-info">
                    <div class="product-meta">
                        <h3>Camiseta Pasion</h3>
                        <p>R$ 120</p>
                    </div>
                    <button onclick="addToCart('Camiseta Pasion', 120)" class="buy-btn">QUERO!</button>
                </div>
            </div>

            <div class="product-card">
                <img src="fotos/foto5.jpg" class="product-img" alt="Cosmos Drop">
                <div class="product-info">
                    <div class="product-meta">
                        <h3>Vestido Jasmin</h3>
                        <p>R$ 195</p>
                    </div>
                    <button onclick="addToCart('Vestido Jasmin', 195)" class="buy-btn">QUERO!</button>
                </div>
            </div>

        </div>
    </section>

    <footer id="contact">
        <div class="footer-logo-container">
            <img src="logo/logo.png" class="footer-logo-img" alt="COSMOS Logo">
        </div>
        <p class="footer-text">Moda Atemporal. Cosmos &copy; 2026</p>
    </footer>

    <script>
        let cart = [];
        const myPhone = "5548999999999"; // SUBSTITUA PELO SEU NÚMERO

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
            document.getElementById('cart-modal').style.display = 'block';
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'none' || modal.style.display === '') ? 'block' : 'none';
        }

        function updateCart() {
            const itemsContainer = document.getElementById('cart-items');
            const countLabel = document.getElementById('cart-count');
            const totalLabel = document.getElementById('cart-total');
            itemsContainer.innerHTML = "";
            let total = 0;

            cart.forEach((item) => {
                total += item.price;
                itemsContainer.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom: 1px solid #222; padding-bottom: 5px;">
                        <span>${item.name}</span>
                        <span>R$ ${item.price}</span>
                    </div>`;
            });

            countLabel.innerText = cart.length;
            totalLabel.innerText = `TOTAL: R$ ${total}`;
        }

        function sendWhatsApp() {
            if (cart.length === 0) {
                alert("Sua sacola está vazia!");
                return;
            }
            let msg = "Olá Cosmos! Quero fazer um pedido:\n\n";
            cart.forEach(item => msg += `- ${item.name}: R$ ${item.price}\n`);
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            msg += `\n*Total: R$ ${total}*`;
            
            const url = `https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
